<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not found · crossref-exports</title>
    <!-- Absolute path: GitHub Pages serves this for any unknown path, and a
         relative href would resolve against that (nonexistent) path. The site is
         always deployed under /crossref-exports/, so this is stable. -->
    <link rel="stylesheet" href="/crossref-exports/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="https://leanprover-community.github.io/mathlib4_docs/">Mathlib</a>
      cross-references
    </header>
    <main id="content">
      <h1>Page not found</h1>
      <p>
        This site only serves cross-reference redirects. Try a URL of the form
        <code>/crossref-exports/?db=&lt;db&gt;&amp;id=&lt;id&gt;#doc</code> (or
        <code>#src</code>).
      </p>
      <p>
        See the
        <a href="https://github.com/leanprover-community/crossref-exports"
          >crossref-exports</a
        >
        repository for details.
      </p>
    </main>
  </body>
</html>
